name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_PORTFOLIO_API_URL: ${{ secrets.VITE_PORTFOLIO_API_URL }}
          VITE_CONTACT_FORM_URL: ${{ secrets.VITE_CONTACT_FORM_URL }}

      - name: Copy built site to repository root
        run: |
          cp dist/dev.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/avatar.png avatar.png
          cp dist/screen-removebg-preview.png screen-removebg-preview.png
          cp dist/Rishabh_Kharbanda.pdf Rishabh_Kharbanda.pdf
          cp dist/favicon.ico favicon.ico
          cp dist/favicon.svg favicon.svg
          cp dist/favicon-32.png favicon-32.png
          cp dist/apple-touch-icon.png apple-touch-icon.png
          cp dist/favicon-512.png favicon-512.png
          cp dist/robots.txt robots.txt
          cp dist/sitemap.xml sitemap.xml
          cp dist/site.webmanifest site.webmanifest
          touch .nojekyll

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ avatar.png screen-removebg-preview.png Rishabh_Kharbanda.pdf favicon.ico favicon.svg favicon-32.png apple-touch-icon.png favicon-512.png robots.txt sitemap.xml site.webmanifest .nojekyll
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: build site for GitHub Pages [skip ci]"
          git push
