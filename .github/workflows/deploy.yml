name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Copy built site to repository root
        run: |
          cp dist/dev.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/avatar.png avatar.png
          cp dist/Rishabh_Kharbanda_CV_v2.pdf Rishabh_Kharbanda_CV_v2.pdf
          touch .nojekyll

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ avatar.png Rishabh_Kharbanda_CV_v2.pdf .nojekyll
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: build site for GitHub Pages [skip ci]"
          git push
